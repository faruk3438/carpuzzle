name: carpark_puzzle
description: CarPark Puzzle — Faryzen Studios
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3

  # Persistence
  shared_preferences: ^2.2.2

  # Audio
  audioplayers: ^5.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Video
  video_player: ^2.8.3

  # Monetization
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/levels/
